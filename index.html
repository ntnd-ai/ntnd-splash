  <style>
    /* ── super-early splash · one screen, zero scroll ────────────────── */
    html, body { height: 100%; }
    body {
      margin: 0; overflow: hidden;
      font-family: var(--font-body); color: var(--mesh-ink); background: var(--mesh-base);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }
    /* brand mesh wash (same language as the site) */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(1000px 620px at 84% -12%, oklch(0.85 0.12 60 / 0.55), transparent 60%),
        radial-gradient(900px 640px at -8% 116%, oklch(0.81 0.12 222 / 0.5), transparent 62%),
        radial-gradient(760px 560px at 50% 128%, oklch(0.78 0.12 340 / 0.4), transparent 60%);
    }
    /* faint grid, fading out toward edges */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(color-mix(in oklch, var(--mesh-ink) 6%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in oklch, var(--mesh-ink) 6%, transparent) 1px, transparent 1px);
      background-size: 54px 54px;
      -webkit-mask-image: radial-gradient(120% 120% at 50% 45%, #000 35%, transparent 78%);
      mask-image: radial-gradient(120% 120% at 50% 45%, #000 35%, transparent 78%);
    }

    .splash {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: clamp(22px, 3.2vh, 40px);
      padding: 28px 24px;
    }

    .splash-logo { height: clamp(38px, 6.4vw, 70px); width: auto; display: block; }

    /* the brand echo line */
    .splash-echo {
      font-family: var(--font-mono); font-weight: 500;
      font-size: clamp(15px, 2.1vw, 22px); letter-spacing: -0.01em;
      color: color-mix(in oklch, var(--mesh-ink) 72%, transparent);
      margin: 0; display: inline-flex; align-items: baseline; gap: 0.4ch; flex-wrap: wrap; justify-content: center;
    }
    .splash-echo .pr { color: var(--chrome-2); font-weight: 700; }
    .splash-echo .cur {
      display: inline-block; width: 0.55ch; height: 1.05em; background: var(--mesh-ink);
      transform: translateY(0.12em); animation: sp-blink 1s steps(2) infinite;
    }
    @keyframes sp-blink { 50% { opacity: 0; } }

    /* CTAs */
    .splash-ctas { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .sbtn {
      display: inline-flex; align-items: center; gap: 0.6em;
      padding: 16px 26px; border-radius: var(--r-pill, 999px); border: 0; cursor: pointer;
      font-family: var(--font-mono); font-weight: 700; font-size: 13px;
      letter-spacing: 0.2em; text-transform: uppercase; line-height: 1; text-decoration: none;
      transition: transform 0.15s cubic-bezier(.2,.7,.3,1), box-shadow 0.15s, border-color 0.15s;
    }
    .sbtn svg { width: 16px; height: 16px; }
    .sbtn-primary { background: var(--mesh-ink); color: var(--mesh-base); }
    .sbtn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 38px -16px color-mix(in oklch, var(--mesh-ink) 55%, transparent); }
    .sbtn-secondary { background: transparent; color: var(--mesh-ink); border: 1.5px solid color-mix(in oklch, var(--mesh-ink) 42%, transparent); }
    .sbtn-secondary:hover { border-color: var(--mesh-ink); transform: translateY(-1px); }

    /* socials */
    .splash-socials { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 460px; }
    .s-ico {
      width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
      color: color-mix(in oklch, var(--mesh-ink) 70%, transparent);
      border: 1px solid color-mix(in oklch, var(--mesh-ink) 14%, transparent);
      background: color-mix(in oklch, var(--mesh-base) 55%, transparent);
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      transition: background-color 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
    }
    .s-ico:hover { background: var(--mesh-ink); color: var(--mesh-base); border-color: var(--mesh-ink); transform: translateY(-2px); }
    .s-ico svg { width: 17px; height: 17px; fill: currentColor; }

    .splash-sep { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: color-mix(in oklch, var(--mesh-ink) 42%, transparent); margin: -6px 0 -2px; }

    @media (max-height: 560px) {
      .splash { gap: 16px; }
      .splash-echo { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .splash-echo .cur { animation: none; }
      *, *::before, *::after { transition: none !important; }
    }
  </style>
